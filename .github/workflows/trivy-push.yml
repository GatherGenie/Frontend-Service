# .github/workflows/trivy-push.yml
name: Trivy Scan & Push

on:
  workflow_run:
    workflows: ["Docker Build"]
    types:
      - completed

jobs:
  scan-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rebuild image (needed in new runner)
      - name: Build Image Again
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest ./

      # -------------------------------
      # TRIVY SCAN
      # -------------------------------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
          exit-code: 1
          severity: CRITICAL,HIGH

      # -------------------------------
      # DOCKER LOGIN
      # -------------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -------------------------------
      # PUSH
      # -------------------------------
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
