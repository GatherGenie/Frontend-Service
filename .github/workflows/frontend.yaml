name: Frontend CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm install
        working-directory: ./src

      # 4. Build App
      - name: Build Application
        run: npm run build
        working-directory: ./src

      # -------------------------------
      #  SONARCLOUD SCAN
      # -------------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=aravindroy1_Frontend-Service-A
            -Dsonar.organization=aravindroy1
            -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------------
      # SNYK SCAN
      # -------------------------------
      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # -------------------------------
      # DOCKER BUILD
      # -------------------------------
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest .

      # -------------------------------
      # TRIVY SCAN
      # -------------------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # -------------------------------
      #  DOCKER LOGIN
      # -------------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -------------------------------
      # PUSH IMAGE
      # -------------------------------
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
