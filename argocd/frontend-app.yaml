apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/GatherGenie/Frontend-Service.git
    targetRevision: main
    path: frontend-chart
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: team3-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    